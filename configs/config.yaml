# SSH Arena server configuration
server:
  host: "0.0.0.0"
  port: 8080
  max_players: 100
  tick_rate: 20
  save_interval: 300

game:
  world_width: 1000
  world_height: 1000
  chunk_size: 32
  starting_credits: 1000
  tax_rate: 0.05
  research_speed: 1.0

database:
  driver: "sqlite3"
  dsn: "./game.db"
  migrate: true
  pool_size: 10

logging:
  level: "info"
  format: "json"
  output: "stdout"
  with_caller: true

ssh:
  port: 2222
  private_key_path: "./ssh_host_key"
  authorized_keys: "./authorized_keys"
  banner: "Welcome to SSH Arena!"
  idle_timeout: 300
